<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
:root{
  --navy:#1E3A5F; --navy-mid:#3D6B99; --navy-light:#7BA3CC;
  --navy-bg:#E8EEF4; --navy-bg-light:#F0F4F8;
  --dark:#1A1A2E; --secondary:#6B7B8D; --muted:#9AA7B4; --white:#FFFFFF;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{width:1920px;height:1080px;overflow:hidden;
  font-family:'Noto Sans CJK JP','Noto Sans JP',sans-serif;
  padding:72px 96px;background:var(--white);color:var(--dark);}
.eyebrow{font-size:38px;font-weight:700;color:var(--navy);margin-bottom:14px;}
.title{font-size:68px;font-weight:900;color:var(--dark);margin-bottom:50px;line-height:1.08;letter-spacing:-0.02em;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:44px;margin-bottom:46px;}
.card{border-radius:16px;padding:40px 46px;min-height:440px;box-shadow:0 4px 14px rgba(0,0,0,0.06);}
.card.weak{background:#EEF1F4;border-top:10px solid var(--muted);}
.card.strong{background:var(--navy-bg-light);border-top:10px solid var(--navy);}
.tag{font-family:'JetBrains Mono','Courier New',monospace;font-size:28px;font-weight:700;margin-bottom:10px;}
.weak .tag{color:var(--secondary);}
.strong .tag{color:var(--navy);}
.headline{font-size:44px;font-weight:900;margin-bottom:14px;}
.weak .headline{color:var(--secondary);}
.strong .headline{color:var(--dark);}
.verdict{font-size:34px;font-weight:700;margin-bottom:26px;}
.weak .verdict{color:var(--muted);}
.strong .verdict{color:var(--navy);}
.item{font-size:30px;font-weight:400;color:var(--secondary);padding:14px 0;border-bottom:1px solid #D8E0EC;line-height:1.3;}
.item:last-child{border-bottom:none;}
.strong .item{color:var(--dark);}
.footer{display:flex;justify-content:space-between;align-items:center;padding-top:30px;border-top:2px solid var(--navy-bg);}
.stat{font-size:40px;font-weight:700;color:var(--secondary);}
.stat strong{font-size:80px;font-weight:900;color:var(--navy);}
.brand{font-size:28px;color:var(--secondary);}
</style>
</head>
<body>
  <div class="eyebrow">店舗集客のLLMO、どっちが引用される?</div>
  <div class="title">答えはllms.txtでなく<br>Googleビジネスプロフィール</div>
  <div class="grid">
    <div class="card weak">
      <div class="tag">// 自社サイト側</div>
      <div class="headline">llms.txt / JSON-LD</div>
      <div class="verdict">AIは引用しなかった</div>
      <div class="item">AIが店舗情報を取りに来ない裏口</div>
      <div class="item">構造化しても集客には無力</div>
      <div class="item">代行の月3万円の主戦場でもない</div>
    </div>
    <div class="card strong">
      <div class="tag">// GBP一次データ</div>
      <div class="headline">店主の経験 (E-E-A-T)</div>
      <div class="verdict">AIが引用する表口</div>
      <div class="item">店主が撮った写真 (Exif付き)</div>
      <div class="item">本人の声で返した口コミ返信</div>
      <div class="item">埋まった属性とQ&amp;A</div>
    </div>
  </div>
  <div class="footer">
    <div class="stat">月の追加作業 <strong>60&ndash;90分</strong></div>
    <div class="brand">kenimoto.dev</div>
  </div>
</body>
</html>
