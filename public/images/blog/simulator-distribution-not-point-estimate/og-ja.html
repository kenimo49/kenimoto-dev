<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
:root {
  --navy: #1E3A5F;
  --navy-mid: #3D6B99;
  --navy-light: #7BA3CC;
  --navy-bg-light: #F0F4F8;
  --dark: #1A1A2E;
  --secondary: #6B7B8D;
  --white: #FFFFFF;
  --border: #D8E0EC;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 1200px;
  height: 630px;
  overflow: hidden;
}
body {
  font-family: 'Noto Sans CJK JP', 'Noto Sans JP', sans-serif;
  background: var(--white);
  color: var(--dark);
  padding: 56px 64px;
  position: relative;
  display: flex;
  flex-direction: column;
}
.kicker {
  font-size: 26px;
  font-weight: 700;
  color: var(--navy-mid);
  letter-spacing: 0.04em;
  margin-bottom: 14px;
}
.title {
  font-size: 60px;
  font-weight: 900;
  color: var(--dark);
  line-height: 1.12;
  letter-spacing: -0.02em;
  margin-bottom: 26px;
}
.title .hl { color: var(--navy); }
.row {
  display: flex;
  gap: 28px;
  align-items: stretch;
  flex: 1;
}
.card {
  flex: 1;
  background: var(--navy-bg-light);
  border-radius: 16px;
  padding: 26px 30px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.card.left  { border-top: 8px solid var(--navy-light); }
.card.right { border-top: 8px solid var(--navy); }
.c-label { font-size: 28px; font-weight: 900; color: var(--navy); margin-bottom: 12px; }
.point-num { font-size: 92px; font-weight: 900; color: var(--navy); line-height: 0.95; letter-spacing: -0.03em; }
.point-cap { font-size: 26px; font-weight: 700; color: var(--navy-mid); margin-top: 6px; }
.dist-line { font-size: 30px; font-weight: 700; color: var(--dark); line-height: 1.5; }
.dist-line .em { color: var(--navy); font-weight: 900; }
.dist-tail { font-size: 28px; font-weight: 700; color: var(--white); background: var(--navy-mid); border-radius: 10px; padding: 8px 16px; margin-top: 14px; display: inline-block; }
.brand { position: absolute; bottom: 26px; right: 64px; font-size: 24px; font-weight: 400; color: var(--secondary); }
</style>
</head>
<body>
  <div class="kicker">AIエージェント / Simulator 設計</div>
  <div class="title">予測を1つの数字で信じるな:<br><span class="hl">点推定でなく確率分布</span>を返せ</div>
  <div class="row">
    <div class="card left">
      <div class="c-label">点推定</div>
      <div class="point-num">2,000</div>
      <div class="point-cap">幅ゼロ &rarr; 後続が過信</div>
    </div>
    <div class="card right">
      <div class="c-label">確率分布</div>
      <div class="dist-line">中央値 <span class="em">2,100</span><br>95%CI <span class="em">1,600&ndash;2,800</span></div>
      <div class="dist-tail">尾部 p95 = 3,400</div>
    </div>
  </div>
  <div class="brand">kenimoto.dev</div>
</body>
</html>
